<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpartanGPT - AI Chat Interface</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 900px;
            height: 90vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 25px 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2em;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .header p {
            font-size: 0.9em;
            opacity: 0.9;
        }

        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 30px;
            background: #f7f9fc;
        }

        .message {
            margin-bottom: 20px;
            display: flex;
            gap: 15px;
            animation: fadeIn 0.3s ease-in;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            justify-content: flex-end;
        }

        .message-content {
            max-width: 70%;
            padding: 15px 20px;
            border-radius: 18px;
            line-height: 1.5;
        }

        .message.user .message-content {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .message.assistant .message-content {
            background: white;
            color: #333;
            border: 1px solid #e0e0e0;
        }

        .message-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            flex-shrink: 0;
        }

        .message.user .message-icon {
            background: #764ba2;
            color: white;
        }

        .message.assistant .message-icon {
            background: #667eea;
            color: white;
        }

        .input-area {
            padding: 25px 30px;
            background: white;
            border-top: 1px solid #e0e0e0;
        }

        .input-row {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
        }

        textarea {
            flex: 1;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            padding: 15px;
            font-size: 16px;
            resize: none;
            font-family: inherit;
            transition: border-color 0.3s;
        }

        textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .settings {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }

        .setting {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .setting label {
            font-size: 14px;
            color: #666;
            font-weight: 500;
        }

        .setting input {
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            padding: 8px 12px;
            width: 120px;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 20px;
            color: #667eea;
        }

        .loading.active {
            display: block;
        }

        .error {
            background: #ff4444;
            color: white;
            padding: 15px;
            border-radius: 12px;
            margin: 20px;
            display: none;
        }

        .error.active {
            display: block;
        }

        .status-bar {
            padding: 10px 20px;
            background: #f0f0f0;
            border-top: 1px solid #e0e0e0;
            font-size: 12px;
            color: #666;
            text-align: center;
        }

        .status-bar.connected {
            background: #d4edda;
            color: #155724;
        }

        .status-bar.disconnected {
            background: #f8d7da;
            color: #721c24;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <h1>⚔️ SpartanGPT</h1>
            <p>AI Language Model Chat Interface</p>
        </div>

        <div class="chat-area" id="chatArea">
            <div class="message assistant">
                <div class="message-icon">AI</div>
                <div class="message-content">
                    👋 Hello! I'm SpartanGPT. Ask me anything and I'll do my best to help!
                    <br><br>
                    <small><em>Note: This model is currently untrained, so responses will be random. Train the model for
                            meaningful outputs!</em></small>
                </div>
            </div>
        </div>

        <div class="error" id="errorBox"></div>
        <div class="loading" id="loading">⏳ Generating response...</div>

        <div class="input-area">
            <div class="settings">
                <div class="setting">
                    <label for="maxTokens">Max Tokens</label>
                    <input type="number" id="maxTokens" value="50" min="1" max="500">
                </div>
                <div class="setting">
                    <label for="temperature">Temperature</label>
                    <input type="number" id="temperature" value="0.7" min="0" max="2" step="0.1">
                </div>
                <div class="setting">
                    <label for="topK">Top-K</label>
                    <input type="number" id="topK" value="5" min="1" max="50">
                </div>
            </div>
            <div class="input-row">
                <textarea id="userInput" placeholder="Type your message here..." rows="3"></textarea>
                <button id="sendBtn" onclick="sendMessage()">Send</button>
            </div>
        </div>

        <div class="status-bar" id="statusBar">
            Checking connection...
        </div>
    </div>

    <script>
        // Configuration
        const API_URL = 'http://localhost:8000';
        const messages = [];

        // Check API health on load
        window.addEventListener('load', checkHealth);

        async function checkHealth() {
            const statusBar = document.getElementById('statusBar');
            try {
                const response = await fetch(`${API_URL}/health`);
                if (response.ok) {
                    statusBar.textContent = '✅ Connected to SpartanGPT API';
                    statusBar.className = 'status-bar connected';
                } else {
                    throw new Error('API not responding');
                }
            } catch (error) {
                statusBar.textContent = '❌ Not connected - Make sure API is running on port 8000';
                statusBar.className = 'status-bar disconnected';
            }
        }

        function addMessage(role, content) {
            const chatArea = document.getElementById('chatArea');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}`;

            const icon = role === 'user' ? 'U' : 'AI';
            messageDiv.innerHTML = `
                <div class="message-icon">${icon}</div>
                <div class="message-content">${escapeHtml(content)}</div>
            `;

            chatArea.appendChild(messageDiv);
            chatArea.scrollTop = chatArea.scrollHeight;

            messages.push({ role, content });
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        async function sendMessage() {
            const input = document.getElementById('userInput');
            const sendBtn = document.getElementById('sendBtn');
            const loading = document.getElementById('loading');
            const errorBox = document.getElementById('errorBox');
            const message = input.value.trim();

            if (!message) return;

            // Clear error
            errorBox.className = 'error';

            // Add user message
            addMessage('user', message);
            input.value = '';

            // Disable input
            sendBtn.disabled = true;
            loading.className = 'loading active';

            try {
                // Get settings
                const maxTokens = parseInt(document.getElementById('maxTokens').value);
                const temperature = parseFloat(document.getElementById('temperature').value);
                const topK = parseInt(document.getElementById('topK').value);

                // Call API
                const response = await fetch(`${API_URL}/v1/chat/completions`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        messages: [{ role: 'user', content: message }],
                        max_tokens: maxTokens,
                        temperature: temperature,
                        top_k: topK
                    })
                });

                if (!response.ok) {
                    throw new Error(`API returned ${response.status}: ${response.statusText}`);
                }

                const data = await response.json();
                const aiResponse = data.choices[0].message.content;

                // Add AI response
                addMessage('assistant', aiResponse);

            } catch (error) {
                console.error('Error:', error);
                errorBox.textContent = `Error: ${error.message}. Make sure the API server is running on ${API_URL}`;
                errorBox.className = 'error active';
            } finally {
                // Re-enable input
                sendBtn.disabled = false;
                loading.className = 'loading';
            }
        }

        // Allow Enter to send (Shift+Enter for new line)
        document.getElementById('userInput').addEventListener('keydown', function (e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });
    </script>
</body>

</html>
